<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>面接突破クイズ</title>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8398161859137802"
     crossorigin="anonymous"></script>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e3a8a,#312e81);
  color:#fff;
}
header{
  text-align:center;
  padding:32px 16px;
}
header h1{
  margin:0;
  font-size:32px;
}
header p{
  opacity:.9;
}
.wrap{
  max-width:900px;
  margin:auto;
  padding:16px;
}
.card{
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.2);
  border-radius:24px;
  padding:24px;
  box-shadow:0 20px 50px rgba(0,0,0,.25);
  backdrop-filter:blur(12px);
}
.ad{
  margin:18px auto;
  padding:10px;
  background:rgba(255,255,255,.08);
  border-radius:16px;
}
.status{
  display:flex;
  justify-content:space-between;
  gap:12px;
  margin-bottom:16px;
  font-weight:700;
}
.bar{
  width:100%;
  height:12px;
  background:rgba(255,255,255,.2);
  border-radius:999px;
  overflow:hidden;
  margin-bottom:20px;
}
.bar span{
  display:block;
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#22c55e,#facc15);
  transition:.3s;
}
.question{
  font-size:22px;
  font-weight:800;
  line-height:1.6;
  margin-bottom:20px;
}
.options{
  display:grid;
  gap:12px;
}
button{
  border:none;
  cursor:pointer;
  border-radius:16px;
  padding:15px 18px;
  font-size:16px;
  font-weight:700;
}
.option{
  background:#fff;
  color:#111827;
  text-align:left;
  transition:.2s;
}
.option:hover{
  transform:translateY(-2px);
  background:#dbeafe;
}
.option.correct{
  background:#22c55e;
  color:#fff;
}
.option.wrong{
  background:#ef4444;
  color:#fff;
}
.explain{
  margin-top:18px;
  padding:16px;
  background:rgba(0,0,0,.25);
  border-radius:16px;
  line-height:1.7;
  display:none;
}
.next{
  display:none;
  margin-top:18px;
  width:100%;
  background:#facc15;
  color:#111827;
}
.start,.restart{
  background:#22c55e;
  color:#fff;
  width:100%;
  margin-top:16px;
}
.result{
  text-align:center;
  display:none;
}
.score{
  font-size:48px;
  font-weight:900;
  color:#facc15;
}
.rank{
  font-size:26px;
  font-weight:900;
  margin:12px 0;
}
.badge{
  display:inline-block;
  padding:8px 14px;
  background:#facc15;
  color:#111827;
  border-radius:999px;
  font-weight:900;
  margin-bottom:12px;
}
.small{
  font-size:14px;
  opacity:.85;
}
@media(max-width:600px){
  header h1{font-size:26px}
  .question{font-size:18px}
}
</style>
</head>

<body>
<header>
  <h1>面接突破クイズ</h1>
  <p>面接で評価される答え方・NG回答・逆質問をクイズでチェック！</p>
</header>

<div class="wrap">

  <div class="ad">
    <!-- UIゲーム -->
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-8398161859137802"
         data-ad-slot="6325875393"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>
         (adsbygoogle = window.adsbygoogle || []).push({});
    </script>
  </div>

  <div class="card" id="startScreen">
    <h2>ルール</h2>
    <p>面接でよくある場面に対して、もっとも評価されやすい答えを選んでください。</p>
    <p class="small">全30問ランダム出題。回答後、自動で次の問題へ進みます。</p>
    <button class="start" onclick="startGame()">スタート</button>
  </div>

  <div class="card" id="quizScreen" style="display:none;">
    <div class="status">
      <div id="count">1 / 30</div>
      <div id="score">正解 0</div>
    </div>
    <div class="bar"><span id="bar"></span></div>
    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="explain" id="explain"></div>
    <button class="next" id="nextBtn" onclick="nextQuestion()">次へ</button>
  </div>

  <div class="card result" id="resultScreen">
    <div class="badge">結果発表</div>
    <div class="score" id="finalScore"></div>
    <div class="rank" id="rank"></div>
    <p id="comment"></p>

    <div class="ad">
      <!-- UIゲーム -->
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-8398161859137802"
           data-ad-slot="6325875393"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      <script>
           (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
    </div>

    <button class="restart" onclick="location.reload()">もう一度挑戦する</button>
  </div>

</div>

    answer:1,

    answer:2,
    exp:"本音として通勤面があっても、志望動機の中心にすると意欲が低く見えやすいです。"

  {
    q:"面接で遅刻しそうな時の対応は？",
    options:["何も連絡しない","到着後に謝ればいい","分かった時点で電話やメールで連絡する","走れば問題ない"],

  {

  {
    q:"「残業はできますか？」への無難な答え方は？",
    options:["絶対に無理です","必要な場面では対応できます。ただし効率も意識したいです","毎日何時間でもできます","質問に答えない"],
    answer:1,
    exp:"柔軟性と効率意識の両方を伝えるとバランスが良いです。"

  },
  {

    options:["とにかく高くしてください","求人条件を理解したうえで、経験に応じて相談したいです","いくらでもいいです","答えたくありません"],

  },

    options:["結論から話す","具体例を出す","前職や他人の悪口を言う","相手の質問に答える"],
    answer:2,
    exp:"悪口は協調性や人柄への不安につながりやすいので避けましょう。"
  },
  {
    q:"「成功体験」を話す時に良い構成は？",
    options:["すごかったですで終わる","課題→行動→結果→学びで話す","結果だけ話す","運が良かっただけと言う"],
    answer:1,
    exp:"成功体験はSTAR法に近い形で、課題・行動・結果・学びを伝えると分かりやすいです。"
  },
  {
    q:"「失敗経験」を聞かれた時に良い答えは？",
    options:["失敗したことはありません","失敗内容・原因・改善策・現在の工夫を話す","人のせいにする","笑ってごまかす"],
    answer:1,
    exp:"失敗経験は、学びと改善行動を伝えることで成長力を示せます。"
  },
  {
    q:"面接でメモを取っても良い？",
    options:["絶対ダメ","必要なら一言断って取る","無言でずっと書き続ける","面接官の顔を見ない"],
    answer:1,
    exp:"メモを取る時は『メモを取ってもよろしいでしょうか』と一言添えると丁寧です。"
  },
  {
    q:"「他社の選考状況」を聞かれた時は？",
    options:["全部ウソをつく","正直に概要を伝え、御社への関心も伝える","怒る","何も受けていないと言い切る"],
    answer:1,
    exp:"選考状況は正直に伝えつつ、志望度や判断軸を補足すると良いです。"
  },
  {
    q:"面接官に好印象を与えやすい姿勢は？",
    options:["背もたれに深くもたれる","軽く背筋を伸ばして話す","足を組む","机に肘をつく"],
    answer:1,
    exp:"姿勢は印象に直結します。自然に背筋を伸ばすだけでも誠実に見えます。"
  },
  {
    q:"オンライン面接で事前に確認すべきことは？",
    options:["通信環境・カメラ・マイク・背景","服装は上だけでいい","開始時間に起きる","部屋を暗くする"],
    answer:0,
    exp:"オンライン面接は通信、音声、カメラ、背景、照明の確認が重要です。"
  },
  {
    q:"「なぜ未経験職種に応募したのですか？」への良い答えは？",
    options:["なんとなくです","興味だけです","これまでの経験との接点と学習行動を話す","楽そうだからです"],
    answer:2,
    exp:"未経験応募では、なぜ挑戦するのか、何を学んでいるのかを具体的に伝えることが大切です。"
  },
  {
    q:"面接で自信がなさそうに見える行動は？",
    options:["はっきり話す","目線を適度に合わせる","語尾が小さくなる","結論から話す"],
    answer:2,
    exp:"語尾が小さいと自信がない印象になりやすいです。最後まで聞こえる声で話しましょう。"
  },

    answer:0,

    answer:1,
    exp:"弱みを聞かれたら、批判ではなく分析と改善視点で答えるのが安全です。"
  },

    answer:1,
    exp:"柔軟性と前向きさを見られる質問です。希望はありつつも学ぶ姿勢を示しましょう。"
  },
  {
    q:"「周囲からどんな人と言われますか？」の答え方は？",
    options:["人気者ですだけ言う","具体的な評価と、それを示すエピソードを話す","分かりません","悪く言われますだけ言う"],
    answer:1,
    exp:"第三者評価は具体例があると説得力が増します。"
  },
  {
    q:"面接で話が長くなりそうな時は？",
    options:["そのまま話し続ける","要点を先に伝え、必要なら補足する","全部省略する","質問を変える"],
    answer:1,
    exp:"結論を先に言えば、長くなっても相手が理解しやすくなります。"
  },
  {
    q:"「質問はありますか？」で避けたい回答は？",
    options:["入社後に期待される役割を聞く","活躍している人の特徴を聞く","調べれば分かる基本情報だけ聞く","配属後の流れを聞く"],
    answer:2,
    exp:"ホームページや求人票に明記されていることだけを聞くと、準備不足に見える場合があります。"
  }
];

let questions = [];
let current = 0;
let correct = 0;
let answered = false;

function shuffle(arr){
  return arr.sort(() => Math.random() - 0.5);
}

function startGame(){
  questions = shuffle([...allQuestions]).slice(0,30);
  current = 0;
  correct = 0;
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("quizScreen").style.display = "block";
  showQuestion();
}

function showQuestion(){
  answered = false;
  const q = questions[current];
  document.getElementById("count").textContent = `${current + 1} / ${questions.length}`;
  document.getElementById("score").textContent = `正解 ${correct}`;
  document.getElementById("bar").style.width = `${(current / questions.length) * 100}%`;
  document.getElementById("question").textContent = q.q;
  document.getElementById("explain").style.display = "none";
  document.getElementById("explain").textContent = "";
  document.getElementById("nextBtn").style.display = "none";

  const optionsEl = document.getElementById("options");
  optionsEl.innerHTML = "";

  q.options.forEach((text, index) => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = text;
    btn.onclick = () => answer(index, btn);
    optionsEl.appendChild(btn);
  });
}

function answer(index, btn){
  if(answered) return;
  answered = true;

  const q = questions[current];
  const buttons = document.querySelectorAll(".option");

  buttons.forEach((b, i) => {
    b.disabled = true;
    if(i === q.answer) b.classList.add("correct");
  });

  if(index === q.answer){
    correct++;
  }else{
    btn.classList.add("wrong");
  }

  document.getElementById("score").textContent = `正解 ${correct}`;
  document.getElementById("explain").style.display = "block";
  document.getElementById("explain").textContent = q.exp;

  setTimeout(() => {
    nextQuestion();
  }, 1300);
}

function nextQuestion(){
  current++;
  if(current >= questions.length){
    showResult();
  }else{
    showQuestion();
  }
}

function showResult(){
  document.getElementById("quizScreen").style.display = "none";
  document.getElementById("resultScreen").style.display = "block";
  document.getElementById("bar").style.width = "100%";

  const percent = Math.round((correct / questions.length) * 100);
  document.getElementById("finalScore").textContent = `${correct} / ${questions.length}`;

  let rank = "";
  let comment = "";

  if(percent >= 90){
    rank = "面接突破レベル：S";
    comment = "かなり優秀です。受け答えの軸ができています。本番でも落ち着いて話せば高評価を狙えます。";
  }else if(percent >= 75){
    rank = "面接突破レベル：A";
    comment = "十分に戦えるレベルです。志望動機と逆質問をさらに磨くと通過率が上がります。";
  }else if(percent >= 55){
    rank = "面接突破レベル：B";
    comment = "基本は押さえています。NG回答を避け、具体例を増やすとさらに良くなります。";
  }else{
    rank = "面接突破レベル：C";
    comment = "まだ伸びしろがあります。結論から話す、企業研究をする、短所や退職理由を前向きに言い換える練習をしましょう。";
  }

  document.getElementById("rank").textContent = rank;
  document.getElementById("comment").textContent = comment;
}
</script>
